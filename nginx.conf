server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets
    gzip on;
    gzip_types text/css application/javascript image/svg+xml image/png font/woff2;

    # Long cache for versioned assets (fonts, images, CSS, JS)
    location ~* \.(css|js|woff2?|ttf|png|jpg|jpeg|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML — no cache so updates are seen immediately
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Fallback to index.html (future-proofs any client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
